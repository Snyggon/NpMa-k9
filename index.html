function getRank(){
  const level = getLevel();
  let rank = RANKS[0];
  for(const r of RANKS){ if(level >= r.minLevel) rank = r; }
  return rank;
}
function getNextRank(){
  const level = getLevel();
  for(const r of RANKS){ if(level < r.minLevel) return r; }
  return null;
}

// --- ACHIEVEMENT SYSTEM ---
function getEarnedAchievements(){ return lsGet('achievements',[]); }

function checkAchievements(){
  const tp = getTotalProgress();
  const g = getGradeReadiness();
  const streak = getStreak();
  const xp = getXp();
  const earned = getEarnedAchievements();
  const newEarned = [];

  // Count fully completed chapters
  const fullChapters = chapters.filter(ch=>{const p=getChapterProgress(ch.id);return p.total>0&&p.done===p.total;}).length;
  // Count C-unlocks
  const cUnlocks = chapters.filter(ch=>isStageUnlocked(ch.id,'C')).length;

  const checks = {
    first_solve: tp.done>=1,
    ten_done: tp.done>=10,
    twentyfive: tp.done>=25,
    fifty_pct: tp.total>0 && tp.done/tp.total>=0.5,
    all_e: tp.eT>0 && tp.eD===tp.eT,
    all_c: tp.cT>0 && tp.cD===tp.cT,
    all_a: tp.aT>0 && tp.aD===tp.aT,
    first_quiz: chapters.some(ch=>['E','C','A'].some(s=>isQuizPassed(ch.id,s))),
    perfect_quiz: lsGet('has_perfect_quiz',false),
    streak_7: streak>=7,
    streak_14: streak>=14,
    streak_30: streak>=30,
    xp_1000: xp>=1000,
    xp_5000: xp>=5000,
    chapter_done: fullChapters>=1,
    three_ch: fullChapters>=3,
    grade_e: 'EDCBA'.includes(g.grade),
    grade_c: 'CBA'.includes(g.grade),
    grade_a: g.grade==='A',
    first_unlock: cUnlocks>=1,
  };

  for(const [id,cond] of Object.entries(checks)){
    if(cond && !earned.includes(id)){
      earned.push(id);
      newEarned.push(id);
    }
  }

  if(newEarned.length>0){
    lsSet('achievements',earned);
    newEarned.forEach((id,i)=>{
      const ach = ACHIEVEMENTS.find(a=>a.id===id);
      if(ach){
        setTimeout(()=>{
          showXpPopup(ach.icon,`Prestation: ${ach.name}!`,ach.desc);
          // Bonus XP for achievement
          addXp(25);
        }, i*2200+600);
      }
    });
  }
  return earned;
}

// --- UNLOCK EXPLOSION ---
let pendingUnlock = null;

function triggerUnlockExplosion(element){
  if(!element) return;
  const rect = element.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;

  // Particles burst
  const colors = ['#00d4ff','#a855f7','#facc15','#22c55e','#f472b6','#fff'];
  for(let i=0;i<24;i++){
    const p = document.createElement('div');
    p.className = 'unlock-particle';
    const angle = (Math.PI*2*i)/24 + (Math.random()-.5)*.3;
    const dist = 30+Math.random()*70;
    const size = 4+Math.random()*6;
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${colors[i%colors.length]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }

  // Flash on element
  const flash = document.createElement('div');
  flash.className = 'unlock-flash';
  element.appendChild(flash);
  setTimeout(()=>flash.remove(),600);

  // Confetti
  if(window.confetti){
    const cx01 = cx/window.innerWidth, cy01 = cy/window.innerHeight;
    confetti({particleCount:60,spread:80,origin:{x:cx01,y:cy01},colors:['#00d4ff','#a855f7','#facc15']});
  }
}

function playPendingUnlock(){
  if(!pendingUnlock) return;
  const {chId,stage} = pendingUnlock;
  // Only play on the correct chapter page; keep pending otherwise
  if(currentPage!=='chapter'||currentChapter!==chId) return;
  pendingUnlock = null;

  const tabId = `stab-${chId}-${stage}`;
  const tab = document.getElementById(tabId);
  if(tab){
    tab.classList.add('just-unlocked');
    triggerUnlockExplosion(tab);
    setTimeout(()=>tab.classList.remove('just-unlocked'),2000);
    setTimeout(()=>{
      showXpPopup('🔓',`${stage}-nivå upplåst!`,'Nya utmaningar väntar!');
    },400);
  }
}

// --- PROFILE HERO (reusable) ---
function renderProfileHero(animate){
  const rank = getRank();
  const next = getNextRank();
  const level = getLevel();
  const xp = getXp();
  const tp = getTotalProgress();
  const g = getGradeReadiness();
  const streak = getStreak();
  const earned = getEarnedAchievements();
  const chDone = chapters.filter(ch=>{const p=getChapterProgress(ch.id);return p.total>0&&p.done===p.total;}).length;

  let rankPct=100, rankText='Högsta rang uppnådd!';
  if(next){
    const curXp=(rank.minLevel-1)*XP_PER_LEVEL;
    const nextXp=(next.minLevel-1)*XP_PER_LEVEL;
    rankPct=Math.min(100,Math.round(100*(xp-curXp)/Math.max(1,nextXp-curXp)));
    rankText=`${nextXp-xp} XP till ${next.name}`;
  }

  return `<div class="profile-hero ${animate?'animate-in':''}" style="border-color:${rank.color};max-width:520px;margin:0 auto 20px;cursor:pointer" onclick="showPage('profile')">
    <div class="profile-banner" style="background:linear-gradient(135deg,${rank.color}33,${rank.color}11,var(--bg-card))">
      <div style="position:absolute;top:12px;right:16px;font-size:.65rem;color:${rank.color};font-weight:700;z-index:2">${rank.title}</div>
    </div>
    <div class="profile-body">
      <div class="profile-avatar-wrap" style="border-color:${rank.color};background:${rank.color}18;box-shadow:0 0 25px ${rank.color}33">${renderAvatar(88)}</div>
      <div class="profile-rank-name" style="color:${rank.color};display:flex;align-items:center;justify-content:center;gap:6px">${rank.name}${getEquipped().item?`<img src="img/items/${getEquipped().item}.png" style="width:32px;height:32px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))">`:''}</div>
      <div class="profile-rank-title">Level ${level} &middot; ${xp} XP &middot; Betyg: ${g.grade}</div>
      <div class="profile-stats-row">
        <div class="profile-stat-box"><div class="profile-stat-val" style="color:var(--neon-green)">${tp.done}</div><div class="profile-stat-lbl">Klara</div></div>
        <div class="profile-stat-box"><div class="profile-stat-val" style="color:var(--neon-orange)">${streak}</div><div class="profile-stat-lbl">Streak</div></div>
        <div class="profile-stat-box"><div class="profile-stat-val" style="color:var(--neon-purple)">${earned.length}</div><div class="profile-stat-lbl">Badges</div></div>
        <div class="profile-stat-box"><div class="profile-stat-val" style="color:var(--neon-blue)">${chDone}</div><div class="profile-stat-lbl">Kapitel</div></div>
      </div>
      <div style="padding:10px;background:var(--bg-surface);border-radius:var(--radius)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <img src="img/ranks/${rank.img}" style="width:28px;height:28px;object-fit:contain">
          <div class="grade-bar" style="flex:1"><div class="grade-bar-fill" style="width:${rankPct}%;background:linear-gradient(90deg,${rank.color},${next?next.color:rank.color})"></div></div>
          <img src="img/ranks/${next?next.img:rank.img}" style="width:28px;height:28px;object-fit:contain;opacity:${next?.4:1}">
        </div>
        <div style="font-size:.65rem;color:var(--text-dim)">${rankText}</div>
      </div>
    </div>
  </div>`;
}

// --- PROFILE PAGE ---
function renderProfilePage(){
  const rank = getRank();
  const next = getNextRank();
  const level = getLevel();
  const xp = getXp();
  const earned = getEarnedAchievements();
  const chDone = chapters.filter(ch=>{const p=getChapterProgress(ch.id);return p.total>0&&p.done===p.total;});

  return `<div style="max-width:700px;margin:0 auto">
    ${renderProfileHero(true)}

    <div class="card animate-in" style="margin-bottom:20px;animation-delay:.1s">
      <div class="card-title">🎖️ Rankvägen</div>
      <div class="rank-path">
        ${RANKS.map((r,i)=>{
          const isEarned = level>=r.minLevel;
          const isCurrent = r===rank;
          const connector = i>0?`<div class="rank-connector ${level>=r.minLevel?'filled':''}"></div>`:'';
          return `${connector}<div class="rank-node ${isCurrent?'current':isEarned?'earned':'locked'}" style="color:${r.color}">
            <div class="rank-node-icon"><img src="img/ranks/${r.img}" style="width:36px;height:36px;object-fit:contain;${isEarned?'':'filter:grayscale(1) brightness(.5)'}"></div>
            <div class="rank-node-name" style="${isEarned?'color:'+r.color:''}">${r.name}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card animate-in" style="margin-bottom:20px;animation-delay:.15s">
      ${(()=>{
        const weak=chapters.map(ch=>{
          const p=getChapterProgress(ch.id);
          const pct=p.total>0?Math.round(100*p.done/p.total):0;
          const vikt=PROV_VIKT[ch.id]||0;
          return {ch,pct,vikt};
        }).filter(x=>x.pct<100).sort((a,b)=>a.pct-b.pct||(b.vikt-a.vikt)).slice(0,3);
        if(!weak.length) return '<div class="card-title">&#127942; Alla områden klara!</div><p style="color:var(--neon-green);font-size:.85rem;text-align:center;padding:16px">Du har övat klart alla kapitel. Snyggt jobbat!</p>';
        return '<div class="card-title">&#127919; Fokusera här</div><p style="font-size:.75rem;color:var(--text-dim);margin-bottom:12px">Dina svagaste områden — störst effekt att öva på dessa!</p>' +
          weak.map((w,i)=>{
            const urgency=w.vikt>=8?'Hög provvikt!':w.vikt>=5?'Medel provvikt':'';
            return '<div class="focus-area" onclick="showPage(\'chapter\','+w.ch.id+')">' +
              '<div class="focus-rank">'+(i+1)+'</div>' +
              '<div class="focus-info">' +
                '<div class="focus-name">'+(CH_ICONS[w.ch.id]||'')+' '+w.ch.title.split(':')[0].split('&')[0].trim()+'</div>' +
                '<div style="display:flex;align-items:center;gap:8px;margin-top:4px">' +
                  '<div class="grade-bar" style="flex:1;height:6px"><div class="grade-bar-fill" style="width:'+w.pct+'%;background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple));box-shadow:0 0 8px rgba(59,130,246,.3)"></div></div>' +
                  '<span style="font-size:.7rem;font-weight:700;color:var(--neon-blue)">'+w.pct+'%</span>' +
                '</div>' +
                (urgency?'<div style="font-size:.6rem;color:var(--neon-orange);margin-top:3px">&#9888;&#65039; '+urgency+'</div>':'') +
              '</div>' +
              '<div class="focus-go">&#10132;</div>' +
            '</div>';
          }).join('');
      })()}
    </div>

    <div class="card animate-in" style="margin-bottom:20px;animation-delay:.2s">
      <div class="card-title">😺 Avatarer</div>
      ${renderCosmeticGrid('avatar',AVATARS,'avatars')}
    </div>

    <div class="card animate-in" style="margin-bottom:20px;animation-delay:.25s">
      <div class="card-title">🖼️ Ramar</div>
      ${renderCosmeticGrid('frame',FRAMES,'frames')}
    </div>

    <div class="card animate-in" style="margin-bottom:20px;animation-delay:.3s">
      <div class="card-title">🎒 Accessoarer</div>
      ${renderCosmeticGrid('item',ITEMS,'items')}
    </div>

    <div class="card animate-in" style="margin-bottom:20px;animation-delay:.35s">
      <div class="card-title">🏆 Prestationer (${earned.length}/${ACHIEVEMENTS.length})</div>
      <div class="ach-grid">
        ${ACHIEVEMENTS.map(a=>{
          const has = earned.includes(a.id);
          return `<div class="ach-card ${has?'earned':'locked'}">
            <div class="ach-icon">${has?a.icon:'🔒'}</div>
            <div class="ach-name">${has?a.name:'???'}</div>
            <div class="ach-desc">${has?a.desc:'Inte upplåst ännu'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="text-align:center;margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)">
      <button class="btn" style="background:rgba(239,68,68,.06);color:rgba(239,68,68,.5);border:1px solid rgba(239,68,68,.1);padding:8px 20px;font-size:.7rem" onclick="resetAll()">
        Återställ alla framsteg
      </button>
    </div>
  </div>`;
}

// --- INIT ---
document.addEventListener('DOMContentLoaded',()=>{
  updateStreak();
  updateTopbar();
  const wait = setInterval(()=>{
    if(window.renderMathInElement){ clearInterval(wait); render(); checkAchievements(); }
  },100);
  setTimeout(()=>{ clearInterval(wait); render(); checkAchievements(); },3000);
});
</script>
